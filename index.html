<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的信</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-section">
  <h2>登录 / 注册</h2>
  <input type="email" id="email" placeholder="邮箱">
  <input type="password" id="password" placeholder="密码">
  <button onclick="login()">登录</button>
  <button onclick="register()">注册</button>
</div>

<div id="letter-section" style="display:none;">
  <input id="search" oninput="loadLetters()" placeholder="搜索信件内容...">

  <h2>写一封信</h2>
  <div class="mood">
    <button onclick="setMood('😊')">😊</button>
    <button onclick="setMood('😢')">😢</button>
    <button onclick="setMood('😠')">😠</button>
    <button onclick="setMood('🥰')">🥰</button>
    <button onclick="setMood('✨')">✨</button>
  </div>
  <textarea id="content" placeholder="想说的话..."></textarea>
  <button onclick="sendLetter()">发送</button>

  <div id="letters-list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
